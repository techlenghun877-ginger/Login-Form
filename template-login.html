<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&display=swap");

       /*
        conic-gradient(
          from var(--angle),
          transparent 0%,
          transparent 25%,
          #a855f7 40%,
          #ec4899 50%,
          #06b6d4 60%,
          transparent 75%,
          transparent 100%
        )
        */

      :root {
        --body-background: #0a0a0f;
        --subtitle-color:  #6b6a7a;
        --title-color: #f1f0f5;
        --label-color: #9998a8;
        --input-background-color: #1a1a24;
        --input-placeholder-color: #3f3f52;
        --input-color: #f1f0f5;
        --input-focus-border-color: rgba(168, 85, 247, 0.5);
        --input-border-color: rgba(255, 255, 255, 0.08);
        --input-focus-background-color: #1e1e2e;
        --forget-password-color: #a855f7;
        --forget-password-hover-color: #ec4899;
        --signin-btn-background-color: linear-gradient(135deg, #a855f7, #ec4899);
        --signin-btn-color: white;
        --signup-btn-color: #a855f7;
        --signup-btn-hover-color: #ec4899;
        --divider-background-color: rgba(255, 255, 255, 0.06);
        --form-background: #111118;
      }

      * {
        margin: 0px;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0a0a0f;
        font-family: "Sora", sans-serif;
      }



      @property --angle {
        syntax: "<angle>";
        initial-value: 0deg;
        inherits: false;
      }

      @keyframes spin {
        /* from {} */
        to {
          --angle: 360deg;
        }
      }
      .container {
        width: 380px;
        min-height: 100px;
        background: conic-gradient(
          from var(--angle),
          transparent 0%,
          transparent 25%,
          #a855f7 40%,
          #ec4899 50%,
          #06b6d4 60%,
          transparent 75%,
          transparent 100%);
        border-radius: 12px;
        padding: 8px;
        animation: spin 3s linear infinite;
        display:flex;
      }

      .form-wrapper {
        width: 100%;
        height: 100%;
        background-color: var(--form-background);
        border-radius: 6px;
        padding: 32px;
      }

      h1 {
        font-size: 22px;
        color: var(--title-color);
        font-weight: bold;
        margin-bottom: 4px;
      }
      
      .subtitle {
        font-size: 13px;
        color: var(--subtitle-color);
        margin-bottom: 24px;
      }

      label {
        display: block;
        font-size: 12px;
        font-weight: 500;
        margin-bottom: 6px;
        color: var(--label-color);
        text-transform: uppercase;
        letter-spacing: 0.4px;
      }

      input[type="email"], input[type="password"] {
        outline:none;
        background-color: var(--input-background-color);
        padding: 12px 16px;
        width: 100%;
        border-radius: 12px;
        border: 1px solid var(--input-border-color);
        font-size: 14px;
        color:var(--input-color);
        
      }

      input::placeholder {
        color: var(--input-placeholder-color);
      }

      #forgot-password {
        text-decoration: none;
        color: var(--forget-password-color);
        display:block;
        text-align: right;
        font-size: 12px;
        margin-top: 10px;
        
      }

      .field {
        margin-bottom: 16px;
      }

      .field input:focus {
        border: 1px solid var(--forget-password-color);
      }

      .password input:focus {
        border: 1px solid var(--forget-password-color);
      }

      input[type="submit"] {
        background: var(--signin-btn-background-color);
        padding: 12px;
        border-radius: 12px;
        border: none;
        color: var(--signin-btn-color);
        width: 100%;
        font-weight: bold;
        margin-top: 32px;
      }
      
      .divider {
        display: flex;
        align-items: center;
        color: var(--divider-background-color);
        font-size: 12px;
        gap: 12px;
        margin-top: 16px;
        margin-bottom: 16px;
      }

      .divider::before, .divider::after{
        content: "";
        width: 100%;
        height: 1px;
        background-color: var(--divider-background-color);
        display:block;
      }

      .footer-container {
        display: flex;          
        justify-content: center;
        align-items: center;     
        gap: 8px;               
        margin-top: 20px;
        
      }  

      .text-gray {
        font-size: 13px;
        color: var(--subtitle-color);
      }

      .link-purple {
        text-decoration: none;
        color: var(--forget-password-color);
        font-size: 12px; 
        font-weight: 500px; 
      }

    </style>
  </head>
  <body>
    /* YOUR CODE HERE */
    <div class="container">
      <div class="form-wrapper">
        <h1>Welcome Back</h1>
        <p class="subtitle">Sign in to your account</p>

        <form action="">
          <div class="field">
            <label for="email">Email</label>
            <input type="email" name="email" id="email" placeholder="you@example.com"/>
          </div>

          <div class="password">
            <label for="password">Password</label>
            <input type="password" name="password" id="password" placeholder=".........."/>
          </div>

          <a href="" id="forgot-password">Forgot password</a>

          <input type="submit" value="Sign in"/>

          <div class="divider">
            <span>or</span>
          </div>

          <div class="footer-container">
            <span class="text-gray">Don't have an account?</span>
            <a href="#" class="link-purple">Create one</a>
          </div>

        
        </form>
      </div>
    </div>
  </body>
</html>
